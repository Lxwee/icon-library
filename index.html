<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标库 - Icon Library</title>
    <meta name="description" content="团队统一图标资源管理平台，支持搜索、预览、复制代码">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0b0b11;
            --bg-surface: #13131d;
            --bg-card: #1a1a28;
            --bg-card-hover: #222234;
            --bg-input: #1e1e2e;
            --text-1: #eeeef4;
            --text-2: #a0a0b8;
            --text-3: #63637a;
            --border: #2a2a3e;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            color: var(--text-1);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #13131d 0%, #1a1a30 50%, #151530 100%);
            border-bottom: 1px solid var(--border);
            padding: 32px 0 24px;
        }

        .header-inner {
            max-width: 1320px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo .version {
            font-size: 11px;
            color: var(--text-3);
            background: var(--bg-card);
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            margin-left: 8px;
        }

        .header-stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* ===== CONTROLS ===== */
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 200px;
            max-width: 400px;
        }

        .search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            width: 18px;
            height: 18px;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 42px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-1);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-3);
        }

        .filter-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .pill {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-2);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .pill:hover {
            border-color: var(--accent);
            color: var(--text-1);
        }

        .pill.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .pill .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .view-controls {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }

        .size-slider {
            width: 100px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .color-picker-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 12px;
            color: var(--text-2);
        }

        .color-picker-wrap input[type="color"] {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        /* ===== GRID ===== */
        .grid-container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 24px;
        }

        .group-section {
            margin-bottom: 36px;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .group-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .group-title {
            font-size: 16px;
            font-weight: 600;
        }

        .group-count {
            font-size: 12px;
            color: var(--text-3);
            background: var(--bg-card);
            padding: 2px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--cell-size, 120px), 1fr));
            gap: 8px;
        }

        .icon-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 8px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .icon-card:hover {
            border-color: var(--accent);
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .icon-card .icon-preview {
            width: var(--icon-size, 32px);
            height: var(--icon-size, 32px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-card .icon-preview svg {
            width: 100%;
            height: 100%;
        }

        .icon-card .icon-name {
            font-size: 11px;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .icon-card .icon-id {
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .icon-card .copy-toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: var(--accent);
            color: #fff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.2s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 10;
        }

        .icon-card.copied .copy-toast {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 520px;
            max-width: 92vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            padding: 24px 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { font-size: 18px; font-weight: 600; }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

        .modal-body { padding: 24px; }

        .modal-preview {
            display: flex;
            justify-content: center;
            padding: 32px;
            background: var(--bg-card);
            border-radius: var(--radius);
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .modal-preview svg {
            width: 80px;
            height: 80px;
        }

        .modal-info { margin-bottom: 20px; }

        .modal-info-row {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .modal-info-label {
            font-size: 12px;
            color: var(--text-3);
            width: 60px;
            flex-shrink: 0;
            line-height: 28px;
        }

        .modal-info-value {
            font-size: 13px;
            color: var(--text-1);
            line-height: 28px;
        }

        .modal-tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-right: 4px;
            color: var(--text-2);
        }

        .code-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
        }

        .code-tab {
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-3);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .code-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .code-block {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-2);
            position: relative;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-2);
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .copy-btn.done { background: var(--success); color: #fff; border-color: var(--success); }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-3);
        }

        .empty-state .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state h3 { font-size: 18px; color: var(--text-2); margin-bottom: 8px; }

        footer {
            text-align: center;
            padding: 32px;
            color: var(--text-3);
            font-size: 12px;
            border-top: 1px solid var(--border);
            margin-top: 48px;
        }

        @media (max-width: 768px) {
            .header-top { flex-direction: column; gap: 16px; text-align: center; }
            .header-stats { justify-content: center; }
            .controls { flex-direction: column; }
            .search-wrap { max-width: 100%; }
            .filter-pills { justify-content: center; }
            .view-controls { justify-content: center; margin-left: 0; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="header-top">
            <div class="logo">
                <div class="logo-icon">📦</div>
                <h1 id="libName">图标库</h1>
                <span class="version" id="libVersion">v1.0.0</span>
            </div>
            <div class="header-stats">
                <div class="stat">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">图标</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="groupCount">0</div>
                    <div class="stat-label">分组</div>
                </div>
            </div>
        </div>
        <div class="controls">
            <div class="search-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" class="search-input" placeholder="搜索图标名称、ID 或标签..." id="searchInput">
            </div>
            <div class="filter-pills" id="filterPills">
                <button class="pill active" data-group="all">全部</button>
            </div>
            <div class="view-controls">
                <div class="color-picker-wrap">
                    <span>预览色</span>
                    <input type="color" id="previewColor" value="#eeeef4" title="修改图标预览颜色">
                </div>
                <label class="color-picker-wrap" style="cursor:pointer">
                    <span>大小</span>
                    <input type="range" class="size-slider" id="sizeSlider" min="80" max="200" value="120">
                </label>
            </div>
        </div>
    </div>
</header>

<main class="grid-container" id="gridContainer">
    <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">🔍</div>
        <h3>未找到匹配的图标</h3>
        <p>试试其他关键词或切换分组</p>
    </div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="modalTitle">图标详情</h2>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-preview" id="modalPreview"></div>
            <div class="modal-info">
                <div class="modal-info-row">
                    <span class="modal-info-label">引用 ID</span>
                    <span class="modal-info-value" id="modalId" style="font-family:'JetBrains Mono',monospace"></span>
                </div>
                <div class="modal-info-row">
                    <span class="modal-info-label">名称</span>
                    <span class="modal-info-value" id="modalName"></span>
                </div>
                <div class="modal-info-row">
                    <span class="modal-info-label">分组</span>
                    <span class="modal-info-value" id="modalGroup"></span>
                </div>
                <div class="modal-info-row">
                    <span class="modal-info-label">标签</span>
                    <span class="modal-info-value" id="modalTags"></span>
                </div>
            </div>
            <div class="code-tabs" id="codeTabs">
                <button class="code-tab active" data-format="svg">SVG 代码</button>
                <button class="code-tab" data-format="img">IMG 标签</button>
                <button class="code-tab" data-format="vue">Vue</button>
                <button class="code-tab" data-format="react">React</button>
                <button class="code-tab" data-format="css">CSS</button>
            </div>
            <div class="code-block" id="codeBlock">
                <button class="copy-btn" id="codeCopyBtn" onclick="copyCode()">复制</button>
                <code id="codeContent"></code>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>团队图标资源管理平台 · 点击图标查看详情与代码 · 由 GitHub Pages 托管</p>
</footer>

<script>
// ===== State =====
let DATA = null;
let SVG_CACHE = {};
let currentGroup = 'all';
let currentSearch = '';
let currentFormat = 'svg';
let currentIconId = null;

// Detect if running on GitHub Pages or locally
const BASE_URL = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:'
    ? '.'
    : '.';

// ===== Init =====
async function init() {
    try {
        const resp = await fetch(`${BASE_URL}/icons.json`);
        DATA = await resp.json();
    } catch (e) {
        console.error('Failed to load icons.json', e);
        document.getElementById('gridContainer').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">⚠️</div>
                <h3>无法加载图标数据</h3>
                <p>请确保 icons.json 文件存在</p>
            </div>`;
        return;
    }

    // Update header
    document.getElementById('libName').textContent = DATA.name || '图标库';
    document.getElementById('libVersion').textContent = 'v' + (DATA.version || '1.0.0');
    document.getElementById('totalCount').textContent = DATA.icons.length;
    document.getElementById('groupCount').textContent = Object.keys(DATA.groups).length;

    // Build filter pills
    const pillsEl = document.getElementById('filterPills');
    for (const [key, group] of Object.entries(DATA.groups)) {
        const btn = document.createElement('button');
        btn.className = 'pill';
        btn.dataset.group = key;
        btn.innerHTML = `<span class="dot" style="background:${group.color}"></span>${group.label}`;
        btn.addEventListener('click', () => setGroup(key));
        pillsEl.appendChild(btn);
    }

    // Preload all SVGs
    await preloadSVGs();

    // Render
    render();

    // Events
    document.getElementById('searchInput').addEventListener('input', e => {
        currentSearch = e.target.value.trim().toLowerCase();
        render();
    });

    document.getElementById('previewColor').addEventListener('input', e => {
        document.documentElement.style.setProperty('color', e.target.value);
        document.querySelectorAll('.icon-card .icon-preview svg').forEach(svg => {
            svg.style.color = e.target.value;
        });
    });

    document.getElementById('sizeSlider').addEventListener('input', e => {
        document.documentElement.style.setProperty('--cell-size', e.target.value + 'px');
    });

    document.querySelectorAll('.pill[data-group="all"]')[0].addEventListener('click', () => setGroup('all'));

    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
    });

    // Code tabs
    document.querySelectorAll('.code-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.code-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFormat = tab.dataset.format;
            updateCodeBlock();
        });
    });
}

async function preloadSVGs() {
    const promises = DATA.icons.map(async icon => {
        const group = icon.group;
        const url = `${BASE_URL}/icons/${group}/${icon.id}.svg`;
        try {
            const resp = await fetch(url);
            if (resp.ok) {
                SVG_CACHE[icon.id] = await resp.text();
            }
        } catch (e) {
            console.warn(`Failed to load: ${url}`);
        }
    });
    await Promise.all(promises);
}

function setGroup(group) {
    currentGroup = group;
    document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.group === group));
    render();
}

function matchesSearch(icon) {
    if (!currentSearch) return true;
    const q = currentSearch;
    return (
        icon.id.toLowerCase().includes(q) ||
        icon.name.toLowerCase().includes(q) ||
        (icon.tags && icon.tags.some(t => t.toLowerCase().includes(q)))
    );
}

function render() {
    const container = document.getElementById('gridContainer');
    const emptyState = document.getElementById('emptyState');

    // Filter icons
    let icons = DATA.icons.filter(icon => {
        if (currentGroup !== 'all' && icon.group !== currentGroup) return false;
        return matchesSearch(icon);
    });

    // Group them
    const grouped = {};
    icons.forEach(icon => {
        if (!grouped[icon.group]) grouped[icon.group] = [];
        grouped[icon.group].push(icon);
    });

    // Clear (keep empty state)
    container.innerHTML = '';

    if (icons.length === 0) {
        emptyState.style.display = '';
        container.appendChild(emptyState);
        return;
    }
    emptyState.style.display = 'none';

    // Render groups
    for (const [groupKey, groupIcons] of Object.entries(grouped)) {
        const groupInfo = DATA.groups[groupKey] || { label: groupKey, color: '#888' };

        const section = document.createElement('div');
        section.className = 'group-section';
        section.innerHTML = `
            <div class="group-header">
                <div class="group-dot" style="background:${groupInfo.color}"></div>
                <h2 class="group-title">${groupInfo.label}</h2>
                <span class="group-count">${groupIcons.length}</span>
            </div>
        `;

        const grid = document.createElement('div');
        grid.className = 'icon-grid';

        groupIcons.forEach(icon => {
            const card = document.createElement('div');
            card.className = 'icon-card';
            card.dataset.id = icon.id;

            const svgContent = SVG_CACHE[icon.id] || `<svg viewBox="0 0 24 24" width="24" height="24"><text x="12" y="16" text-anchor="middle" font-size="12" fill="#666">?</text></svg>`;

            card.innerHTML = `
                <div class="icon-preview">${svgContent}</div>
                <div class="icon-name">${icon.name}</div>
                <div class="icon-id">${icon.id}</div>
                <span class="copy-toast">已复制 SVG!</span>
            `;

            // Click to open modal
            card.addEventListener('click', () => openModal(icon.id));

            // Right-click to quick copy SVG
            card.addEventListener('contextmenu', e => {
                e.preventDefault();
                const svg = SVG_CACHE[icon.id];
                if (svg) {
                    navigator.clipboard.writeText(svg).then(() => {
                        card.classList.add('copied');
                        setTimeout(() => card.classList.remove('copied'), 1200);
                    });
                }
            });

            grid.appendChild(card);
        });

        section.appendChild(grid);
        container.appendChild(section);
    }

    // Apply current preview color
    const color = document.getElementById('previewColor').value;
    document.querySelectorAll('.icon-card .icon-preview svg').forEach(svg => {
        svg.style.color = color;
    });
}

// ===== Modal =====
function openModal(iconId) {
    currentIconId = iconId;
    const icon = DATA.icons.find(i => i.id === iconId);
    if (!icon) return;

    const groupInfo = DATA.groups[icon.group] || { label: icon.group, color: '#888' };

    document.getElementById('modalTitle').textContent = icon.name;
    document.getElementById('modalId').textContent = icon.id;
    document.getElementById('modalName').textContent = icon.name;
    document.getElementById('modalGroup').innerHTML = `<span style="color:${groupInfo.color}">${groupInfo.label}</span>`;
    document.getElementById('modalTags').innerHTML = (icon.tags || []).map(t => `<span class="modal-tag">${t}</span>`).join('');

    const preview = document.getElementById('modalPreview');
    preview.innerHTML = SVG_CACHE[iconId] || '';
    const svg = preview.querySelector('svg');
    if (svg) svg.style.color = document.getElementById('previewColor').value;

    updateCodeBlock();

    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = '';
    currentIconId = null;
}

function updateCodeBlock() {
    const icon = DATA.icons.find(i => i.id === currentIconId);
    if (!icon) return;

    const svgCode = SVG_CACHE[currentIconId] || '';

    // Generate repo URL (will be updated after deployment)
    const repoBase = location.origin + location.pathname.replace(/\/[^/]*$/, '');
    const svgUrl = `${repoBase}/icons/${icon.group}/${icon.id}.svg`;

    let code = '';
    switch (currentFormat) {
        case 'svg':
            code = svgCode;
            break;
        case 'img':
            code = `<img src="${svgUrl}" alt="${icon.name}" width="24" height="24">`;
            break;
        case 'vue':
            code = `<!-- ${icon.name} -->\n<template>\n  ${svgCode.replace(/\n/g, '\n  ')}\n</template>`;
            break;
        case 'react':
            code = `// ${icon.name}\nconst Icon${icon.id.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join('')} = (props) => (\n  ${svgCode.replace(/class=/g, 'className=').replace(/\n/g, '\n  ')}\n);`;
            break;
        case 'css':
            code = `.icon-${icon.id} {\n  display: inline-block;\n  width: 24px;\n  height: 24px;\n  background: url("${svgUrl}") no-repeat center;\n  background-size: contain;\n}`;
            break;
    }

    document.getElementById('codeContent').textContent = code;
}

function copyCode() {
    const code = document.getElementById('codeContent').textContent;
    const btn = document.getElementById('codeCopyBtn');
    navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '已复制 ✓';
        btn.classList.add('done');
        setTimeout(() => {
            btn.textContent = '复制';
            btn.classList.remove('done');
        }, 2000);
    });
}

// ===== Boot =====
init();
</script>
</body>
</html>
